<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TaskFlow - Gestor de Tareas</title>

    <link rel="stylesheet" href="./assets/css/style.css">

    <!-- Fuente moderna -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Librería Luxon -->

    <script src="https://cdn.jsdelivr.net/npm/luxon@3/build/global/luxon.min.js"></script>

    <!-- Script principal -->

    <script defer type="module" src="./assets/js/script.js"></script>

</head>

<body>

    <header>

        <h1>TaskFlow <span class="check">✔</span></h1>
        <p class="subtitulo">Gestor de tareas</p>

    </header>

    <main>

        <section>

            <h2>Nueva tarea</h2>

            <form id="formulario">

                <input type="text" id="tarea" placeholder="Descripción de la tarea" required>

                <input type="date" id="fecha-vencimiento">

                <select id="prioridad-tarea">

                    <option value="baja">Prioridad baja</option>
                    <option value="media">Prioridad media</option>
                    <option value="alta">Prioridad alta</option>

                </select>

                <button type="submit">Agregar tarea</button>

            </form>

        </section>

        <section>

            <h2>Lista de tareas</h2>

            <ul id="lista-tareas"></ul>

        </section>

        <section>

            <p>Tareas pendientes: <span id="tareas-pendientes">0</span></p>

            <label>Progreso</label>

            <progress id="progreso" value="0" max="100"></progress>

        </section>

    </main>

    <footer class="footer">

        <p>✨ TaskFlow - Organiza tu día con calma y claridad</p>
        <p class="autor">Proyecto Front-End | 2026</p>

    </footer>

</body>

</html>
