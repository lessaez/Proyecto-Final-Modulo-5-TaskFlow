<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TaskFlow - Gestor de Tareas</title>

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">

    <!-- Fuente moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Librería Luxon -->
    <script src="https://cdn.jsdelivr.net/npm/luxon@3/build/global/luxon.min.js"></script>

    <!-- Script principal -->
    <script defer type="module" src="assets/js/script.js"></script>

</head>

<body>

    <!-- Contenedor para notificaciones visuales -->
    <div id="notificaciones-app" aria-live="polite"></div>

    <!-- CLIMA -->
    <div id="clima">
        <h3>Clima actual</h3>
        <p id="clima-info">Cargando clima...</p>
    </div>

    <header>

        <h1>TaskFlow <span class="check">✔</span></h1>
        <p class="subtitulo">Gestor de tareas</p>

        <!-- HORA Y FRASE -->
        <div id="hora-actual"></div>
        <div id="frase-motivacional"></div>

    </header>

    <main>

        <section>

            <h2>Nueva tarea 🗒️</h2>

            <form id="formulario">

                <label for="tarea">Descripción de la tarea</label>
                <input type="text" id="tarea" name="tarea" placeholder="Descripción de la tarea" required
                    autocomplete="off">

                <label for="fecha-vencimiento">Fecha de vencimiento</label>
                <input type="date" id="fecha-vencimiento" name="fecha">

                <label for="prioridad-tarea">Prioridad</label>
                <select id="prioridad-tarea" name="prioridad">
                    <option value="baja">Prioridad baja</option>
                    <option value="media">Prioridad media</option>
                    <option value="alta">Prioridad alta</option>
                </select>

                <button type="submit">Agregar tarea</button>

            </form>

        </section>

        <section>

            <h2>Lista de tareas</h2>

            <ul id="lista-tareas"></ul>

        </section>

        <section>

            <p>Tareas pendientes: <span id="tareas-pendientes">0</span></p>

            <div class="barra-progreso">
                <div id="barra-avance"></div>
            </div>
            <p id="texto-progreso"></p>

        </section>

    </main>

    <footer class="footer">

        <p>✨ TaskFlow - Organiza tu día con calma y claridad</p>
        <p class="autor">Proyecto Front-End | 2026</p>

    </footer>

    <!-- Mensaje para usuarios sin JS -->
    <noscript>
        <p style="text-align:center; padding:10px;">
            Esta aplicación necesita JavaScript para funcionar correctamente.
        </p>
    </noscript>

</body>

</html>
