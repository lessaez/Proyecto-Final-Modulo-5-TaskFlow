<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow: Gestión de Tareas</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="./assets/css/style.css">

    <!-- Bootstrap JS -->
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- Mi JS -->
    <script defer type="module" src="./assets/js/script.js"></script>
</head>

<body>
    <header class="header">
        <h1>TaskFlow: Gestor de Tareas</h1>

        <p>Administra tus tareas con facilidad</p>

    </header>

    <main>
        <section id="buscar-tareas">
            <label for="buscar">Buscar tarea:</label>
            <input type="text" id="buscar" placeholder="Buscar por descripción">
        </section>

        <section id="filtro-ordenar">
            <div id="filtro">
                <label for="filtro-tareas">Filtrar tareas: </label>
                <select id="filtro-tareas">
                    <option value="todos">Todas</option>
                    <option value="pendiente">Pendientes</option>
                    <option value="completada">Completadas</option>
                </select>
            </div>

            <div id="ordenar">
                <label for="ordenar-tareas">Ordenar por: </label>
                <select id="ordenar-tareas">
                    <option value="fecha">Fecha límite</option>
                    <option value="prioridad">Prioridad</option>
                </select>
            </div>
        </section>

        <section id="formulario-tarea">
            <form id="formulario">
                <div class="form-group">
                    <label for="tarea">Descripción de la tarea:</label>
                    <input type="text" id="tarea" placeholder="Ej: Estudiar" required>
                </div>
                <div class="form-group">
                    <label for="fecha-vencimiento">Fecha límite:</label>
                    <input type="date" id="fecha-vencimiento">
                </div>
                <div class="form-group">
                    <label for="prioridad-tarea">Prioridad:</label>
                    <select id="prioridad-tarea">
                        <option value="baja">Baja</option>
                        <option value="media">Media</option>
                        <option value="alta">Alta</option>
                    </select>
                </div>
                <button type="submit">Agregar</button>
            </form>
        </section>

        <section id="contador">
            <p>Tareas pendientes: <span id="tareas-pendientes">0</span></p>
        </section>

        <section id="barra-progreso">
            <label for="progreso">Progreso de tareas:</label>
            <progress id="progreso" value="0" max="100"></progress>
        </section>

        <section id="tareas">
            <h2>Tareas</h2>
            <ul id="lista-tareas"></ul>
        </section>

        <div id="notification" class="hidden"></div>
    </main>

    <footer>
        <p>&copy; 2026 TaskFlow. Todos los derechos reservados.</p>
    </footer>

</body>

</html>
